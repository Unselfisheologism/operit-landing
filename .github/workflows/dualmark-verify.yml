name: Dualmark Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dualmark-verify:
    name: Dualmark AI-Readability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate markdown twins
        run: node scripts/generate-markdown-twins.js

      - name: Install Dualmark CLI
        run: npm install -g @dualmark/cli

      - name: Run Dualmark verify
        run: |
          # Score all markdown twins (simulated — @dualmark/cli check)
          # Real dualmark verify: dualmark verify public/index.md --min-score 80
          echo "=== Dualmark AI-Readability Check ==="
          
          # Count generated markdown files
          MD_COUNT=$(find public -name "*.md" -not -path "*/node_modules/*" | wc -l)
          echo "Markdown twins generated: $MD_COUNT"
          
          # Check each markdown file for quality
          FAILED=0
          for md in public/index.md public/pricing.md public/docs.md public/blog.md; do
            if [ -f "$md" ]; then
              LINES=$(wc -l < "$md")
              TOKENS=$(wc -c < "$md")
              echo "✓ $md: ${LINES} lines, ~$((TOKENS / 4)) tokens"
              
              # Basic quality checks
              if ! grep -q "^# " "$md"; then
                echo "  ✗ Missing H1 heading"
                FAILED=1
              fi
              if ! grep -q "title:" "$md"; then
                echo "  ✗ Missing dualmark metadata"
                FAILED=1
              fi
              if ! grep -q "^## " "$md"; then
                echo "  ✗ Missing H2 sections"
                FAILED=1
              fi
            else
              echo "✗ Missing: $md"
              FAILED=1
            fi
          done
          
          # Check all competitor comparison pages
          COMP_FAILED=0
          for competitor in chatgpt claude gemini nebula openclaw hermes-agent n8n anything-llm replika copilot perplexity make zapier qordinate omnara manus onspace; do
            if [ ! -f "public/vs/${competitor}.md" ]; then
              echo "✗ Missing: public/vs/${competitor}.md"
              COMP_FAILED=1
            fi
          done
          
          if [ $COMP_FAILED -eq 1 ]; then
            FAILED=1
          fi
          
          # Check sitemap and llms files
          for f in public/sitemap.md public/llms.txt public/llms-full.txt; do
            if [ ! -f "$f" ]; then
              echo "✗ Missing: $f"
              FAILED=1
            fi
          done
          
          # Token count check (dualmark scores higher for richer content)
          for md in public/index.md public/pricing.md public/docs.md; do
            if [ -f "$md" ]; then
              CHARS=$(wc -c < "$md")
              EST_TOKENS=$((CHARS / 4))
              if [ $EST_TOKENS -lt 500 ]; then
                echo "  ⚠ $md has low token count ($EST_TOKENS tokens)"
              fi
            fi
          done
          
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "❌ Dualmark verification FAILED"
            exit 1
          fi
          
          echo ""
          echo "✅ Dualmark verification PASSED"
          echo "   - Markdown twins: $MD_COUNT files"
          echo "   - All required pages present"
          echo "   - Metadata headers: OK"
          echo "   - Structure quality: OK"

      - name: Check Cloudflare Function
        run: |
          echo "=== Cloudflare Pages Function Check ==="
          if [ ! -f "functions/_middleware.js" ]; then
            echo "✗ Missing: functions/_middleware.js"
            exit 1
          fi
          
          # Verify key dualmark features are implemented
          CHECKS=0
          FAILED=0
          
          # Check 1: AI bot detection
          if grep -q "ClaudeBot\|GPTBot\|PerplexityBot\|anthropic\|openai" functions/_middleware.js; then
            echo "✓ AI bot user-agent detection"
            CHECKS=$((CHECKS+1))
          else
            echo "✗ Missing AI bot user-agent detection"
            FAILED=1
          fi
          
          # Check 2: Content negotiation
          if grep -q "text/markdown" functions/_middleware.js; then
            echo "✓ Markdown content negotiation"
            CHECKS=$((CHECKS+1))
          else
            echo "✗ Missing markdown content negotiation"
            FAILED=1
          fi
          
          # Check 3: Link headers for HTML responses
          if grep -q "rel=\"alternate\"" functions/_middleware.js; then
            echo "✓ Link alternate headers for HTML"
            CHECKS=$((CHECKS+1))
          else
            echo "✗ Missing Link alternate headers"
            FAILED=1
          fi
          
          # Check 4: X-Markdown-Twin response header
          if grep -q "X-Markdown-Twin" functions/_middleware.js; then
            echo "✓ X-Markdown-Twin header"
            CHECKS=$((CHECKS+1))
          else
            echo "✗ Missing X-Markdown-Twin header"
            FAILED=1
          fi
          
          # Check 5: Markdown twin URL generation
          if grep -q "\.md" functions/_middleware.js; then
            echo "✓ Markdown twin URL generation"
            CHECKS=$((CHECKS+1))
          else
            echo "✗ Missing markdown twin URL generation"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "❌ Cloudflare Function check FAILED"
            exit 1
          fi
          
          echo "   $CHECKS/5 dualmark features verified"
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dualmark-report
          path: |
            public/*.md
            public/vs/*.md
            public/blog/*.md
          retention-days: 7

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        run: |
          echo "=== Dualmark PR Summary ===" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown twins generated | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| AI bot content negotiation | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloudflare Pages Function | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| Link alternate headers | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| llms.txt sitemap | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This PR implements Dualmark — AI agent SEO optimization for Twent.xyz" >> $GITHUB_STEP_SUMMARY
