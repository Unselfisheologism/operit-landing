    <!-- Canonical URL — dynamically set per page via inline script to prevent duplicate content -->

        var path = window.location.pathname.replace(/\/$/, '') || '/';
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) {
          canonical.href = 'https://twent.xyz' + path;
        } else {
          var link = document.createElement('link');
          link.rel = 'canonical';
          link.href = 'https://twent.xyz' + path;
          document.head.appendChild(link);
        }
      })();
    </script>
